name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Backend: install deps, run Django checks + tests, build the Docker image.
  # -------------------------------------------------------------------------
  backend:
    name: Backend — checks, tests, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       hms_test
          POSTGRES_USER:     hms_user
          POSTGRES_PASSWORD: hms_test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hms_user -d hms_test"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      # 64-char random string, only ever used inside CI. Long enough to satisfy
      # Django's security.W009 check (>= 50 chars, sufficient unique chars).
      DJANGO_SECRET_KEY:    "ci-only-9f3a2b6c7d8e1f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f"
      # NOTE: DJANGO_DEBUG is set per-step below — "0" for the deploy check
      # (so security warnings are evaluated meaningfully) and unset (defaults
      # to "1" via settings.py) for tests (so SECURE_SSL_REDIRECT doesn't
      # 301 the Django test client and break every HTTP-based test).
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      FIELD_ENCRYPTION_KEY: "Y_WolMvJBPsQBEIukumncmJbB1EWB_SfkwPppvKhkO8="
      POSTGRES_DB:          hms_test
      POSTGRES_USER:        hms_user
      POSTGRES_PASSWORD:    hms_test_password
      POSTGRES_HOST:        localhost
      POSTGRES_PORT:        "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # CI exercises the PostgreSQL path, so it installs both requirement
        # files (core + prod). The local SQLite-based setup script
        # (setup.sh / setup.bat) only installs requirements.txt — see
        # requirements-prod.txt for why that split exists.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-prod.txt

      - name: Django system checks
        # Fail on ERROR-level issues only. The project intentionally keeps
        # SECURE_HSTS_PRELOAD=False (see comment in hospital_project/settings.py)
        # which raises security.W021 as a WARNING; we don't want CI to block on it.
        env:
          DJANGO_DEBUG: "0"
        run: python manage.py check --deploy --fail-level ERROR

      - name: Django tests
        # Tests run with DEBUG=True (default in settings.py) so that
        # SECURE_SSL_REDIRECT is NOT activated. With it on, every Django
        # test-client request 301-redirects to https:// and the HttpAccessTests
        # suite fails. The unit-level permission tests don't care either way.
        run: python manage.py test --noinput

      - name: Build backend Docker image (smoke)
        # Smoke build is informational. Failures (Docker Hub rate limits,
        # transient buildkit issues on GH runners) don't gate CI — the
        # tests above are the real signal. Re-enable as a required check
        # once the underlying flake is addressed.
        continue-on-error: true
        run: docker build -f deployment/Dockerfile.backend -t hms-backend:ci .

  # -------------------------------------------------------------------------
  # Frontend: install deps, run lint + build, smoke-build the Docker image.
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend — lint, build, image
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend/hospital-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/hospital-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

      - name: Build frontend Docker image (smoke)
        # Smoke build is informational. Failures (Docker Hub rate limits,
        # transient buildkit issues on GH runners) don't gate CI — `npm ci`
        # / `npm run build` above are the real signal. Re-enable as a
        # required check once the underlying flake is addressed.
        continue-on-error: true
        working-directory: .
        run: docker build -f deployment/Dockerfile.frontend -t hms-frontend:ci .
